services:
  - type: web
    name: be3-ai-transformer
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: EMBEDDING_MODE
        value: cloud
      - key: HF_TOKEN
        sync: false # Must be provided in Render Dashboard
      - key: PORT
        value: 10000
      - key: EMBEDDING_MODEL_KEY
        value: bge-small
